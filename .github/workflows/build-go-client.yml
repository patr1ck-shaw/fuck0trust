name: Build Go Client

on:
  push:
    branches: [ main, master ]
    paths:
      - 'client-go/**'
      - '.github/workflows/build-go-client.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'client-go/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        
    - name: Install dependencies
      working-directory: client-go
      run: |
        go mod download
        go mod tidy
      
    # 1. 安装 rsrc 工具，用来在标准编译中把清单 manifest 内嵌进 exe
    - name: Install rsrc tool
      run: go install github.com/akavel/rsrc@latest
      
    # 2. 利用 manifest 声明高 DPI、Windows 10/11 兼容性，生成 syso 编译临时资源
    - name: Generate Windows Resource
      working-directory: client-go
      run: rsrc -manifest fuck0trust.manifest -o rsrc.syso
      
    # 3. 用 Go 原生高速编译（-ldflags="-s -w" 剔除调试信息压缩体积，-H=windowsgui 运行时隐藏黑命令行窗口）
    - name: Build Native Windows Executable
      working-directory: client-go
      run: go build -tags walkgui -ldflags="-s -w -H=windowsgui" -o fuck0trust.exe .
      
    # 4. 验证生成的最终可执行文件是否存在
    - name: Verify Executable
      working-directory: client-go
      run: |
        if (Test-Path "fuck0trust.exe") {
          Write-Output "Native executable built successfully."
        } else {
          throw "Executable not found"
        }
      
    - name: Install UPX
      run: |
        Invoke-WebRequest -Uri "https://github.com/upx/upx/releases/download/v4.2.2/upx-4.2.2-win64.zip" -OutFile upx.zip
        Expand-Archive upx.zip -DestinationPath .
        Move-Item upx-4.2.2-win64\upx.exe .
        
    - name: Compress with UPX
      working-directory: client-go
      run: ..\upx.exe --best --lzma fuck0trust.exe
      continue-on-error: true
      
    - name: Get file size
      working-directory: client-go
      run: |
        $size = (Get-Item fuck0trust.exe).Length / 1MB
        Write-Output "File size: $([math]::Round($size, 2)) MB"
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: fuck0trust-windows
        path: client-go/fuck0trust.exe
        retention-days: 90
        
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: client-go/fuck0trust.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}