name: Build Go Client

on:
  push:
    branches: [ main, master ]
    paths:
      - 'client-go/**'
      - '.github/workflows/build-go-client.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        
    - name: Install dependencies
      working-directory: client-go
      run: |
        go mod download
        go mod tidy
      
    - name: Install rsrc tool
      run: go install github.com/akavel/rsrc@latest
      
    # 👈 【最关键的一行保命指令】只要加上 -arch amd64，就不会报 TTM_ADDTOOL 崩溃！
    - name: Generate Windows Resource
      working-directory: client-go
      run: rsrc -manifest fuck0trust.manifest -o rsrc.syso -arch amd64
      
    # 👈 这是核心编译指令，一行都没少，保证生成原生 GUI
    - name: Build Native Windows Executable
      working-directory: client-go
      run: go build -tags walkgui -ldflags="-s -w -H=windowsgui" -o fuck0trust.exe .
      
    # 找回了你的验证步骤
    - name: Verify Executable
      working-directory: client-go
      run: |
        if (Test-Path "fuck0trust.exe") {
          Write-Output "Native executable built successfully."
        } else {
          throw "Executable not found"
        }
        
    # 找回了你的查大小步骤
    - name: Get file size
      working-directory: client-go
      run: |
        $size = (Get-Item fuck0trust.exe).Length / 1MB
        Write-Output "File size: $([math]::Round($size, 2)) MB"
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: fuck0trust-windows
        path: client-go/fuck0trust.exe
        retention-days: 90
        
    # 找回了你的自动发版步骤
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: client-go/fuck0trust.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}