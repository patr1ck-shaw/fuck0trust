name: Build Go Client

on:
  push:
    branches: [ main, master ]
    paths:
      - 'client-go/**'
      - '.github/workflows/build-go-client.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'client-go/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        
    - name: Install dependencies
      working-directory: client-go
      run: |
        go mod download
        go mod tidy
      
    # 👈 【核心修复 1】丢弃十年前的垃圾 rsrc，换用现代的 go-winres 工具
    - name: Install go-winres tool
      run: go install github.com/tc-hib/go-winres@latest
      
    # 👈 【核心修复 2】完美打包清单和图标，绝不破坏 EXE 结构！
    - name: Generate Windows Resource
      working-directory: client-go
      run: |
        Remove-Item -Path *.syso -ErrorAction SilentlyContinue
        if (Test-Path "app.ico") {
          go-winres simply --manifest fuck0trust.manifest --icon app.ico
        } else {
          go-winres simply --manifest fuck0trust.manifest
        }
      
    - name: Build Native Windows Executable
      working-directory: client-go
      run: go build -tags walkgui -ldflags="-s -w -H=windowsgui" -o fuck0trust.exe .
      
    - name: Verify Executable
      working-directory: client-go
      run: |
        if (Test-Path "fuck0trust.exe") {
          Write-Output "Native executable built successfully."
        } else {
          throw "Executable not found"
        }
        
    - name: Get file size
      working-directory: client-go
      run: |
        $size = (Get-Item fuck0trust.exe).Length / 1MB
        Write-Output "File size: $([math]::Round($size, 2)) MB"
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: fuck0trust-windows
        path: client-go/fuck0trust.exe
        retention-days: 90
        
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: client-go/fuck0trust.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}