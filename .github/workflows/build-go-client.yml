name: Build Go Client

on:
  push:
    branches: [ main, master ]
    paths:
      - 'client-go/**'
      - '.github/workflows/build-go-client.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'client-go/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        
    - name: Install dependencies
      working-directory: client-go
      run: |
        go mod download
        go mod tidy
      
    - name: Install rsrc tool
      run: go install github.com/akavel/rsrc@latest
      
    # 👈 【核心修复 1】带上 -ico app.ico，把图标完美打进 exe 里面去！
    - name: Generate Windows Resource
      working-directory: client-go
      run: |
        if (Test-Path "app.ico") {
          rsrc -manifest fuck0trust.manifest -ico app.ico -o rsrc.syso
        } else {
          rsrc -manifest fuck0trust.manifest -o rsrc.syso
          Write-Output "Warning: app.ico not found, building without icon."
        }
      
    - name: Build Native Windows Executable
      working-directory: client-go
      run: go build -tags walkgui -ldflags="-s -w -H=windowsgui" -o fuck0trust.exe .
      
    - name: Verify Executable
      working-directory: client-go
      run: |
        if (Test-Path "fuck0trust.exe") {
          Write-Output "Native executable built successfully."
        } else {
          throw "Executable not found"
        }
      
    # 👈 【核心修复 2】彻底删除了 Install UPX 和 Compress with UPX 这两段搞破坏的代码！
      
    - name: Get file size
      working-directory: client-go
      run: |
        $size = (Get-Item fuck0trust.exe).Length / 1MB
        Write-Output "File size: $([math]::Round($size, 2)) MB"
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: fuck0trust-windows
        path: client-go/fuck0trust.exe
        retention-days: 90
        
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: client-go/fuck0trust.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}