name: Build Go Client

on:
  push:
    branches: [ main, master ]
    paths:
      - 'client-go/**'
      - '.github/workflows/build-go-client.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019  # 使用 2019 保证兼容性

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install dependencies
      working-directory: client-go
      run: |
        go mod download
        go mod tidy

    - name: Install rsrc tool
      run: go install github.com/akavel/rsrc@latest

    - name: Generate Windows Resource
      working-directory: client-go
      run: rsrc -manifest fuck0trust.manifest -o rsrc.syso
      continue-on-error: true

    # 核心修复：正确的编译参数，启用 CGO，使用 walkgui 标签
    - name: Build Windows Executable
      working-directory: client-go
      env:
        CGO_ENABLED: "1"
        GOOS: windows
        GOARCH: amd64
      run: go build -tags walkgui -ldflags="-H=windowsgui" -o Fuck0TrustClient.exe .
      shell: cmd

    - name: Verify Executable
      working-directory: client-go
      run: |
        if (Test-Path "Fuck0TrustClient.exe") {
          $size = (Get-Item Fuck0TrustClient.exe).Length / 1MB
          Write-Output "✓ 可执行文件构建成功"
          Write-Output "✓ 文件大小: $([math]::Round($size, 2)) MB"
        } else {
          throw "可执行文件未生成"
        }

    # 可选：UPX 压缩（需要先安装 UPX）
    - name: Setup UPX
      run: |
        choco install upx -y
      continue-on-error: true

    - name: Compress with UPX
      working-directory: client-go
      run: |
        upx --best --lzma Fuck0TrustClient.exe
      continue-on-error: true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Fuck0TrustClient-windows
        path: client-go/Fuck0TrustClient.exe
        retention-days: 90

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: client-go/Fuck0TrustClient.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}