name: Build Go Client

on:
  push:
    branches: [ main, master ]
    paths:
      - 'client-go/**'
      - '.github/workflows/build-go-client.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'client-go/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        
    - name: Install dependencies
      working-directory: client-go
      run: |
        go mod download
        go mod tidy
      
    - name: Install rsrc (manifest tool)
      run: go install github.com/akavel/rsrc@latest
      
    - name: Generate resource file
      working-directory: client-go
      run: rsrc -manifest fuck0trust.manifest -o rsrc.syso
      
    - name: Build executable
      working-directory: client-go
      run: go build -ldflags="-s -w -H=windowsgui" -o Fuck0TrustClient.exe .
      
    - name: Install UPX
      run: |
        Invoke-WebRequest -Uri "https://github.com/upx/upx/releases/download/v4.2.2/upx-4.2.2-win64.zip" -OutFile upx.zip
        Expand-Archive upx.zip -DestinationPath .
        Move-Item upx-4.2.2-win64\upx.exe .
        
    - name: Compress with UPX
      working-directory: client-go
      run: ..\upx.exe --best --lzma Fuck0TrustClient.exe
      continue-on-error: true
      
    - name: Get file size
      working-directory: client-go
      run: |
        $size = (Get-Item Fuck0TrustClient.exe).Length / 1MB
        Write-Output "File size: $([math]::Round($size, 2)) MB"
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Fuck0TrustClient-windows
        path: client-go/Fuck0TrustClient.exe
        retention-days: 90
        
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: client-go/Fuck0TrustClient.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
