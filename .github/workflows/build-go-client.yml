name: Build Go Client

on:
  push:
    branches: [ main, master ]
    paths:
      - 'client-go/**'
      - '.github/workflows/build-go-client.yml'
  workflow_dispatch:

jobs:
  build:
    # 修复1：把 latest 改成 2019（解决系统兼容）
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        
    - name: Install dependencies
      working-directory: client-go
      run: |
        go mod download
        go mod tidy
      
    - name: Install rsrc tool
      run: go install github.com/akavel/rsrc@latest
      
    - name: Generate Windows Resource
      working-directory: client-go
      run: rsrc -manifest fuck0trust.manifest -o rsrc.syso -arch amd64
      
    # 修复2：编译命令（核心！去掉 -s -w，开启CGO，保留你所有原有参数）
    - name: Build Native Windows Executable
      working-directory: client-go
      run: |
        set CGO_ENABLED=1
        set GOOS=windows
        set GOARCH=amd64
        go build -tags walkgui -ldflags="-H=windowsgui" -o fuck0trust.exe .
      shell: cmd
      
    - name: Verify Executable
      working-directory: client-go
      run: |
        if (Test-Path "fuck0trust.exe") {
          Write-Output "Native executable built successfully."
        } else {
          throw "Executable not found"
        }
        
    - name: Get file size
      working-directory: client-go
      run: |
        $size = (Get-Item fuck0trust.exe).Length / 1MB
        Write-Output "File size: $([math]::Round($size, 2)) MB"
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: fuck0trust-windows
        path: client-go/fuck0trust.exe
        retention-days: 90
        
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: client-go/fuck0trust.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}