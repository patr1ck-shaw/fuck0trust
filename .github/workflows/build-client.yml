name: Build Windows Client

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build-windows-exe:
    runs-on: windows-2022
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build one-file exe
        run: python -m PyInstaller --onefile --windowed --name Fuck0TrustClient app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fuck0TrustClient-windows-x64
          path: client/dist/Fuck0TrustClient.exe

      - name: Keep latest 3 workflow runs
        if: always() && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = 'build-client.yml';
            const keep = 3;
            const {owner, repo} = context.repo;

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: workflowId,
              per_page: 100,
            });

            const deletableRuns = runs
              .filter((run) => run.id !== context.runId)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
              .slice(Math.max(keep - 1, 0));

            for (const run of deletableRuns) {
              await github.rest.actions.deleteWorkflowRun({
                owner,
                repo,
                run_id: run.id,
              });
              core.info(`Deleted old workflow run #${run.run_number} (${run.id})`);
            }
